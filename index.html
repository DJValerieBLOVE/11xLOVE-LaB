<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11x LOVE LaB - Fall Madly in Love with Life</title>
    <meta name="description" content="Your transformation playground where you build your Divine Masterpiece one experiment at a time. 11 minutes a day." />
    <meta http-equiv="content-security-policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; frame-src 'self' https:; font-src 'self'; base-uri 'self'; manifest-src 'self'; connect-src 'self' blob: https: wss:; img-src 'self' data: blob: https:; media-src 'self' https:">
    
    <!-- Open Graph Protocol -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="11x LOVE LaB - Fall Madly in Love with Life" />
    <meta property="og:description" content="Your transformation playground where you build your Divine Masterpiece one experiment at a time. 11 minutes a day." />
    
    <link rel="manifest" href="/manifest.webmanifest">
    
    <!-- 
      CRITICAL: Plain <style> tag (NOT type="text/tailwindcss") so the Tailwind Play CDN 
      does NOT reprocess these values. These override the CDN's default gray variables.
      Unlayered styles always beat @layer styles per CSS Cascade spec.
    -->
    <style>
      :root,
      :root.light,
      html:not(.dark) {
        --foreground: 0 0% 0% !important;
        --card-foreground: 0 0% 0% !important;
        --popover-foreground: 0 0% 0% !important;
        --secondary-foreground: 0 0% 0% !important;
        --accent-foreground: 0 0% 0% !important;
        --sidebar-foreground: 0 0% 0% !important;
        --sidebar-primary: 0 0% 0% !important;
        --sidebar-accent-foreground: 0 0% 0% !important;
      }
      /* Force body text color to black in light mode */
      body {
        color: hsl(0 0% 0%) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
